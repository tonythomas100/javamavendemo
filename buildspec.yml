version: 0.2

env:
  variables:
    JAVA_HOME: "/usr/lib/jvm/java-21-amazon-corretto"

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing Maven dependencies

  pre_build:
    commands:
      - echo Build started on `date`
      - mvn --version

  build:
    commands:
      - echo Compiling the project
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - target/*.jar
  discard-paths: yes

cache:
  paths:
    - /root/.m2/**/*